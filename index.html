<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炸金花军师</title>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: sans-serif; padding-top: 30px; }
        button { width: 85%; padding: 15px; margin: 8px; font-size: 18px; background: #222; color: #0f0; border: 1px solid #0f0; border-radius: 8px; }
        #res { font-size: 24px; color: #ff0; margin-top: 20px; border: 1px solid #0f0; padding: 15px; min-height: 40px; }
    </style>
</head>
<body>
    <h3>♠️ 炸金花必胜军师 ♥️</h3>
    <button onclick="c(1)">1: 豹子</button>
    <button onclick="c(2)">2: 顺金</button>
    <button onclick="c(3)">3: 金花</button>
    <button onclick="c(4)">4: 顺子</button>
    <button onclick="c(5)">5: 对子</button>
    <button onclick="c(6)">6: 单张</button>
    <div id="res">等待出牌...</div>
    <script>
        function c(v){
            let s="";
            if(v==1) s="必胜：梭哈！";
            else if(v==2) s="极强：猛跟！";
            else if(v==3) s="大牌：稳跟！";
            else if(v==4) s="一般：谨慎！";
            else if(v==5) s="小牌：偷鸡！";
            else s="垃圾：必扔！";
            document.getElementById("res").innerHTML = s;
        }
    </script>
</body>
</html>
