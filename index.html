<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的情人</title>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: sans-serif; padding: 20px; }
        button { width: 90%; padding: 15px; margin: 10px 0; font-size: 18px; background: #222; color: #0f0; border: 1px solid #0f0; border-radius: 10px; cursor: pointer; }
        button:active { background: #0f0; color: #000; }
        #res { margin-top: 20px; font-size: 24px; color: #ff0; border: 2px solid #0f0; padding: 20px; min-height: 40px; font-weight: bold; }
    </style>
</head>
<body>
    <h3>♠️ 炸金花：我的情人 ♥️</h3>
    <button onclick="c(1)">1: 豹子</button>
    <button onclick="c(2)">2: 顺金</button>
    <button onclick="c(3)">3: 金花</button>
    <button onclick="c(4)">4: 顺子</button>
    <button onclick="c(5)">5: 对子</button>
    <button onclick="c(6)">6: 单张</button>

    <div id="res">等待输入...</div>

    <script>
        function c(v){
            let s = "";
            if(v==1) s = ">>> 萌萌跟";
            else if(v==2) s = ">>> 钓他";
            else if(v==3) s = ">>> 稳住";
            else if(v==4) s = ">>> 一般人，多就撤";
            else if(v==5) s = ">>> 反手开";
            else if(v==6) s = ">>> 对方没看就开";
            document.getElementById("res").innerHTML = s;
        }
    </script>
</body>
</html>
