<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的情人</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        #log { margin-bottom: 20px; line-height: 1.5; font-size: 18px; }
        #input-line { display: flex; align-items: center; }
        input { background: #000; border: none; color: #0f0; outline: none; font-size: 18px; flex: 1; padding-left: 5px; }
        .prompt { color: #0f0; }
        .output { color: #ffff00; margin: 10px 0; }
    </style>
</head>
<body onclick="document.getElementById('cmd').focus()">
    <div id="log">
        --- 炸金花：我的情人已启动 ---<br>
        1: 豹子 | 2: 顺金 | 3: 金花 | 4: 顺子 | 5: 对子 | 6: 单张
    </div>
    <div id="input-line">
        <span class="prompt">>>> 请看牌输入数字: </span>
        <input type="text" id="cmd" autofocus onkeydown="run(event)">
    </div>

    <script>
        function run(e) {
            if (e.key === 'Enter') {
                let val = document.getElementById('cmd').value;
                let log = document.getElementById('log');
                let res = "";
                
                if(val == "1") res = "萌萌跟";
                else if(val == "2") res = "钓他";
                else if(val == "3") res = "稳住";
                else if(val == "4") res = "一般人，多就撤";
                else if(val == "5") res = "反手开";
                else if(val == "6") res = "对方没看就开";
                else res = "未知指令";

                log.innerHTML += `<br>>>> ${val}<br><div class="output">${res}</div>`;
                document.getElementById('cmd').value = ""; // 清空输入框
                window.scrollTo(0, document.body.scrollHeight); // 自动滚到底部
            }
        }
    </script>
</body>
</html>
