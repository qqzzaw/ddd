<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>多人扎金花</title>
    <script src="https://socket.io"></script>
    <style>
        body { background: #076324; color: white; text-align: center; font-family: sans-serif; }
        .player { border: 1px solid white; margin: 10px; padding: 10px; display: inline-block; border-radius: 8px; }
        .card { background: white; color: black; display: inline-block; width: 40px; height: 60px; margin: 5px; border-radius: 5px; line-height: 60px; font-weight: bold; }
        .controls { margin-top: 50px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>多人联机牌局</h1>
    <div id="info">底池: <span id="pot">0</span></div>
    <div id="players"></div>
    <div class="controls">
        <button onclick="act('seen')">看牌</button>
        <button onclick="act('call')">跟注</button>
        <button onclick="act('fold')">弃牌</button>
    </div>
    <script>
        const socket = io();
        const myName = "王子_" + Math.floor(Math.random()*100);
        socket.on('connect', () => socket.emit('join', {name: myName, room: 'default'}));
        socket.on('update', (data) => {
            document.getElementById('pot').innerText = data.pot;
            document.getElementById('players').innerHTML = data.players.map(p => `
                <div class="player">
                    <div>${p.name} (${p.chips})</div>
                    <div>${p.hand.map(h => `<div class="card">${h}</div>`).join('')}</div>
                    <div>状态: ${p.status}</div>
                </div>
            `).join('');
        });
        function act(t) { socket.emit('action', {type: t}); }
    </script>
</body>
</html>
